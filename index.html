<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-adsense-account" content="ca-pub-7924864277518239">
<title>Flag Quiz Game</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
    background: #fff;
    margin: 0;
    padding: 20px;
  }

  .header {
    font-size: 28px;
    font-weight: bold;
    color: #1e88e5;
  }

  #score {
    font-size: 22px;
    margin: 10px;
  }

  .flag {
    width: 220px;
    height: 140px;
    border-radius: 10px;
    margin: 20px auto;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    object-fit: cover;
  }

  .option {
    display: block;
    width: 90%;
    max-width: 350px;
    margin: 10px auto;
    padding: 12px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #f2f2f2;
    cursor: pointer;
    font-weight: bold;
    text-transform: uppercase;
  }

  .option:hover { background: #ddd; }

  .correct { background: green !important; color: white; }
  .wrong { background: red !important; color: white; }

  #message {
    font-size: 20px;
    margin: 10px;
    min-height: 25px;
  }

  .footer {
    margin-top: 30px;
    font-size: 13px;
    color: #666;
  }

  .ad-box {
    margin: 20px auto;
  }
</style>
</head>

<body>

<div class="header">🌍 Flag Quiz Game</div>

<div id="score">Score: 0</div>

<!-- 🔥 TOP DISPLAY AD -->
<div class="ad-box">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7924864277518239"
     crossorigin="anonymous"></script>

<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-7924864277518239"
     data-ad-slot="5439800609"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>

<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
</script>
</div>

<div id="message"></div>

<img id="flag" class="flag" src="" />

<div id="options"></div>

<!-- 🔥 IN-FEED AD (BETWEEN GAME CONTENT) -->
<div class="ad-box">
<ins class="adsbygoogle"
     style="display:block"
     data-ad-format="fluid"
     data-ad-layout-key="-fb+5w+4e-db+86"
     data-ad-client="ca-pub-7924864277518239"
     data-ad-slot="6639229416"></ins>

<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
</script>
</div>

<div class="footer">
  <p><b>Privacy Policy:</b> This game does not collect any data.</p>
  <p><b>Contact:</b> support@example.com</p>
</div>

<script>
let score = 0;
let currentQuestion = {};
let questions = [];
let autoNextTimer;

const allQuestions = [
  { flag: "https://flagcdn.com/w320/pk.png", name: "PAKISTAN" },
  { flag: "https://flagcdn.com/w320/in.png", name: "INDIA" },
  { flag: "https://flagcdn.com/w320/bd.png", name: "BANGLADESH" },
  { flag: "https://flagcdn.com/w320/cn.png", name: "CHINA" },
  { flag: "https://flagcdn.com/w320/jp.png", name: "JAPAN" },
  { flag: "https://flagcdn.com/w320/us.png", name: "UNITED STATES" }
];

function startGame() {
  score = 0;
  questions = [...allQuestions].sort(() => Math.random() - 0.5);
  nextQuestion();
}

function nextQuestion() {
  clearTimeout(autoNextTimer);

  if (questions.length === 0) {
    document.getElementById("message").innerHTML =
      `🎉 Game Over! Score: ${score}`;
    document.getElementById("options").innerHTML = "";
    return;
  }

  currentQuestion = questions.pop();

  document.getElementById("flag").src = currentQuestion.flag;
  document.getElementById("score").innerText = "Score: " + score;

  let options = [currentQuestion.name];

  while (options.length < 4) {
    let rand = allQuestions[Math.floor(Math.random() * allQuestions.length)].name;
    if (!options.includes(rand)) options.push(rand);
  }

  options.sort(() => Math.random() - 0.5);

  document.getElementById("options").innerHTML = options.map(opt =>
    `<button class="option" onclick="checkAnswer('${opt}')">${opt}</button>`
  ).join("");

  autoNextTimer = setTimeout(nextQuestion, 5000);
}

function checkAnswer(selected) {
  clearTimeout(autoNextTimer);

  let buttons = document.querySelectorAll(".option");

  buttons.forEach(btn => {
    btn.disabled = true;

    if (btn.innerText === currentQuestion.name) btn.classList.add("correct");
    if (btn.innerText === selected && selected !== currentQuestion.name) btn.classList.add("wrong");
  });

  if (selected === currentQuestion.name) {
    score += 10;
    document.getElementById("message").innerHTML = "✅ Correct!";
  } else {
    document.getElementById("message").innerHTML =
      "❌ Wrong! Answer: " + currentQuestion.name;
  }

  document.getElementById("score").innerText = "Score: " + score;

  setTimeout(nextQuestion, 2000);
}

window.onload = startGame;
</script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7924864277518239"
     crossorigin="anonymous"></script>

</body>
  </html>
