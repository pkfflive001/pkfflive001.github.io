<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flag Quiz Game</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
    background: #fff;
    margin: 0;
    padding: 20px;
  }

  .header {
    font-size: 28px;
    font-weight: bold;
    color: #1e88e5;
  }

  #score {
    font-size: 22px;
    margin: 10px;
  }

  .flag {
    width: 220px;
    height: 140px;
    border-radius: 10px;
    margin: 20px auto;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    object-fit: cover;
  }

  .option {
    display: block;
    width: 90%;
    max-width: 350px;
    margin: 10px auto;
    padding: 12px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #f2f2f2;
    cursor: pointer;
    font-weight: bold;
    text-transform: uppercase;
  }

  .option:hover {
    background: #ddd;
  }

  .correct {
    background: green !important;
    color: white;
  }

  .wrong {
    background: red !important;
    color: white;
  }

  #message {
    font-size: 20px;
    margin: 10px;
    min-height: 25px;
  }

  .footer {
    margin-top: 30px;
    font-size: 13px;
    color: #666;
  }
</style>
</head>

<body>

<div class="header">🌍 Flag Quiz Game</div>

<div id="score">Score: 0</div>
<div id="message"></div>

<img id="flag" class="flag" src="" />

<div id="options"></div>

<div class="footer">
  <p><b>Privacy Policy:</b> This game does not collect any data. Score is saved only in browser.</p>
  <p><b>Contact:</b> support@example.com</p>
</div>

<script>
let score = 0;
let currentQuestion = {};
let questions = [];
let autoNextTimer;

const allQuestions = [
  { flag: "https://flagcdn.com/w320/pk.png", name: "PAKISTAN" },
  { flag: "https://flagcdn.com/w320/in.png", name: "INDIA" },
  { flag: "https://flagcdn.com/w320/bd.png", name: "BANGLADESH" },
  { flag: "https://flagcdn.com/w320/cn.png", name: "CHINA" },
  { flag: "https://flagcdn.com/w320/jp.png", name: "JAPAN" },
  { flag: "https://flagcdn.com/w320/kr.png", name: "SOUTH KOREA" },
  { flag: "https://flagcdn.com/w320/sa.png", name: "SAUDI ARABIA" },
  { flag: "https://flagcdn.com/w320/tr.png", name: "TURKEY" },
  { flag: "https://flagcdn.com/w320/ae.png", name: "UAE" },
  { flag: "https://flagcdn.com/w320/gb.png", name: "UNITED KINGDOM" },
  { flag: "https://flagcdn.com/w320/us.png", name: "UNITED STATES" },
  { flag: "https://flagcdn.com/w320/de.png", name: "GERMANY" },
  { flag: "https://flagcdn.com/w320/fr.png", name: "FRANCE" },
  { flag: "https://flagcdn.com/w320/it.png", name: "ITALY" },
  { flag: "https://flagcdn.com/w320/id.png", name: "INDONESIA" }
];

function startGame() {
  score = 0;
  questions = [...allQuestions].sort(() => Math.random() - 0.5);
  nextQuestion();
}

function nextQuestion() {
  clearTimeout(autoNextTimer);

  if (questions.length === 0) {
    document.getElementById("message").innerHTML =
      `🎉 Game Over! Your Score: ${score}`;
    document.getElementById("options").innerHTML = "";
    return;
  }

  currentQuestion = questions.pop();

  document.getElementById("flag").src = currentQuestion.flag;
  document.getElementById("message").innerHTML = "";
  document.getElementById("score").innerText = "Score: " + score;

  let options = [currentQuestion.name];

  while (options.length < 4) {
    let rand = allQuestions[Math.floor(Math.random() * allQuestions.length)].name;
    if (!options.includes(rand)) options.push(rand);
  }

  options.sort(() => Math.random() - 0.5);

  let html = "";
  options.forEach(opt => {
    html += `<button class="option" onclick="checkAnswer('${opt}')">${opt}</button>`;
  });

  document.getElementById("options").innerHTML = html;

  // ⏱ AUTO NEXT after 5 seconds
  autoNextTimer = setTimeout(() => {
    nextQuestion();
  }, 5000);
}

function checkAnswer(selected) {
  clearTimeout(autoNextTimer);

  let buttons = document.querySelectorAll(".option");

  buttons.forEach(btn => {
    btn.disabled = true;

    if (btn.innerText === currentQuestion.name) {
      btn.classList.add("correct");
    }

    if (btn.innerText === selected && selected !== currentQuestion.name) {
      btn.classList.add("wrong");
    }
  });

  if (selected === currentQuestion.name) {
    score += 10;
    document.getElementById("message").innerHTML = "✅ Correct!";
  } else {
    document.getElementById("message").innerHTML =
      "❌ Wrong! Answer: " + currentQuestion.name;
  }

  document.getElementById("score").innerText = "Score: " + score;

  // ⏱ Next after 2 seconds
  setTimeout(() => {
    nextQuestion();
  }, 2000);
}

window.onload = startGame;
</script>

</body>
</html>
